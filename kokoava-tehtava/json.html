<!DOCTYPE html>
<html lang="fi">
<head>
  <title>DogLife | JSON</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap pohja w3 schools sivuilta -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Oma style CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER osio -->
<div class="p-5 hero text-white text-center">
  <h1>DogLife</h1>
  <p>Satunnainen koirakuva JSON-datasta</p>
</div>

<!-- NAVBAR osio -->
<nav class="navbar navbar-expand-sm navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">DogLife</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Etusivu</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="json.html">Koirakuva</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Sisällöt -->
<div class="container mt-5 text-center">

  <h2>Hae satunnainen koirakuva</h2>
  <p>Paina nappia ja saat kuvan ulkoisesta JSON-rajapinnasta</p>

  <button class="btn btn-primary mb-4" onclick="haeKoira()">
    Näytä koira 
  </button>

  <div id="koiraContainer">
    <p>Et ole vielä hakenut kuvaa</p>
  </div>

</div>

<!-- FOOTER -->
<div class="mt-5 p-4 bg-dark text-white text-center">
  <p>KoiranElämää © 2026</p>
</div>

<!-- JAVASCRIPT koiran haku -->
<script>
function haeKoira() {
  fetch("https://dog.ceo/api/breeds/image/random")
    .then(response => response.json())
    .then(data => {

      document.getElementById("koiraContainer").innerHTML =
        "<img src='" + data.message + "' class='img-fluid rounded shadow' style='max-height:400px;'>";

    })
    .catch(error => {
      document.getElementById("koiraContainer").innerHTML =
        "<p>Virhe ladattaessa kuvaa</p>";
    });
}
</script>

</body>
</html>
