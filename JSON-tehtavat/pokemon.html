<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokemon haku</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Oma tyylitiedosto -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Navigaatio -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">JSON-tehtävät</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Etusivu</a></li>
          <li class="nav-item"><a class="nav-link" href="pokemon.html">Pokemon haku</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Sisältö -->
  <div class="container my-5">
    <h1>Pokemon haku</h1>
    <p>
      <input type="text" id="pokemonName" placeholder="Enter Pokemon name">
      <button class="btn btn-success btn-sm" onclick="poke()">Hae</button>
    </p>
    <p id="nimi">Kirjoita laatikkoon Pokemonin nimi</p>
    <p id="kuva2"></p>
    <p id="vastaus"></p>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Oma JavaScript -->
  <script>
    function poke() {
      const pokeName = document.getElementById("pokemonName").value.toLowerCase();
      let name = document.getElementById("pokemonName").value;

      fetch(`https://pokeapi.co/api/v2/pokemon/${pokeName}`)
        .then(function(response) {
          if (!response.ok) throw new Error("Ei löytynyt");
          return response.json();
        })
        .then(function(responseJson) {
          pokekuva(responseJson, name);
        })
        .catch(function(error) {
          document.getElementById("vastaus").innerHTML = "<p>Tietoa ei pystytä hakemaan</p>";
          document.getElementById("kuva2").innerHTML = "";
          document.getElementById("nimi").innerHTML = "";
        });

      function pokekuva(obj, name) {
        let pokeurl = obj.sprites.front_default;
        document.getElementById("kuva2").innerHTML = `<img src="${pokeurl}" alt="${name}">`;
        document.getElementById("nimi").innerHTML = `<b>${name}</b>`;
        document.getElementById("pokemonName").value = "";
        document.getElementById("vastaus").innerHTML = "";
      }
    }
  </script>

</body>
</html>
